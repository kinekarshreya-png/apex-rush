    <style>

        body { margin: 0; overflow: hidden; font-family: 'Share Tech Mono', monospace; background: #000; }
        #info {

            z-index: 100; pointer-events: none; letter-spacing: 1px;
        }
        .hud {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            pointer-events: none; z-index: 100;
            font-family: 'Share Tech Mono', monospace; font-weight: bold;
        }
        .panel {
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 12px;
            border-left: 3px solid #0f8; color: white;
        }
        .hp-bar { width: 180px; height: 6px; background: #600; border-radius: 3px; margin-top: 4px; }
        .hp-fill {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #0f8, #0cf);
            border-radius: 3px; transition: width 0.15s; box-shadow: 0 0 6px #0f8a;
        }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 100; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.85); }
        .crosshair::before { width: 14px; height: 2px; top: -1px; left: -7px; }
        .crosshair::after  { width: 2px; height: 14px; top: -7px; left: -1px; }
        .crosshair-dot { width: 3px; height: 3px; background: #0f8; border-radius: 50%; box-shadow: 0 0 4px #0f8; }
        @keyframes recoilShake {
            0%   { transform: translate(0,0) rotateZ(0deg); }
            25%  { transform: translate(-1px,2px) rotateZ(-0.3deg); }
            50%  { transform: translate(1px,-1px) rotateZ(0.3deg); }
            75%  { transform: translate(-0.5px,1px) rotateZ(-0.1deg); }
            100% { transform: translate(0,0) rotateZ(0deg); }
        }
        .recoil { animation: recoilShake 0.12s ease-out; }
        .damage {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.5) 100%);
            pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 90;
        }
        .muzzle-flash { position: absolute; inset: 0; background: rgba(255,220,80,0.07); pointer-events: none; opacity: 0; z-index: 89; }
        .screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.92);
            backdrop-filter: blur(14px); display: none;
            align-items: center; justify-content: center; z-index: 200; flex-direction: column;
        }
        .screen.active { display: flex; }
        .glass {
            background: rgba(10,20,30,0.97); border-radius: 24px; padding: 28px; width: 380px;
            text-align: center; border: 1px solid rgba(0,255,136,0.4);
            box-shadow: 0 0 40px rgba(0,255,136,0.1), inset 0 1px 0 rgba(255,255,255,0.05);

        input, button {

            padding: 8px 12px; margin: 6px 0; width: 100%; color: white;
            border-radius: 40px; font-family: 'Share Tech Mono', monospace; box-sizing: border-box;
        }
        button {
            background: linear-gradient(135deg, #1a3a2a, #0d2a1a); cursor: pointer;
            letter-spacing: 1px; transition: background 0.2s, box-shadow 0.2s;

        .map-card {

        .kill-feed {
            position: absolute; top: 70px; right: 15px;

        #reloadLabel {
            position: absolute; bottom: 97px; left: 50%; transform: translateX(-50%);
            color: #ffcc44; font-size: 11px; font-family: 'Share Tech Mono', monospace;

        .vignette {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
            pointer-events: none; z-index: 88;
        }
        #hitMarker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 24px; height: 24px; pointer-events: none; z-index: 105;
            opacity: 0; transition: opacity 0.05s;
        }
        #hitMarker::before, #hitMarker::after { content: ''; position: absolute; background: #ff4422; }
        #hitMarker::before { width: 8px; height: 2px; top: 11px; left: 8px; }
        #hitMarker::after  { width: 2px; height: 8px; top: 8px; left: 11px; }
        h2 { font-family: 'Orbitron', monospace; color: #0f8; letter-spacing: 2px; margin-bottom: 16px; }
        #endTitle { font-family: 'Orbitron', monospace; font-size: 28px; margin-bottom: 12px; }

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js"}}</script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZ_Itzqsj9aHhFdnHrXZG061aWZedvJ94",
            authDomain: "apex-rush-game.firebaseapp.com",
            projectId: "apex-rush-game",
            storageBucket: "apex-rush-game.firebasestorage.app",
            messagingSenderId: "551986148656",

        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ── SCENE SETUP ──────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1a2a);
        scene.fog = new THREE.FogExp2(0x0a1a2a, 0.008);
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 200);
        camera.position.y = 1.6;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // ── LIGHTS (preserved + enhanced) ───────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x404060, 0.9);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
        sunLight.position.set(15, 20, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = sunLight.shadow.mapSize.height = 2048;

        backLight.position.set(-5, 3, -8);
        scene.add(backLight);

        // ── PROCEDURAL TEXTURES ──────────────────────────────────────────────────
        function makeCanvas(size, drawFn) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            drawFn(c.getContext('2d'), size);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }
        const grassTex = makeCanvas(256, (ctx, s) => {
            ctx.fillStyle = '#4a7a3a'; ctx.fillRect(0,0,s,s);
            for (let i=0;i<2000;i++) {
                const x=Math.random()*s, y=Math.random()*s, g=Math.random()*40-20;
                ctx.fillStyle=`rgb(${60+g},${110+g},${50+g})`; ctx.fillRect(x,y,2+Math.random()*2,2+Math.random()*2);
            }
            for (let i=0;i<300;i++) {
                ctx.strokeStyle=`rgba(${50+Math.random()*30},${140+Math.random()*30},${40+Math.random()*20},0.4)`;
                ctx.lineWidth=1; ctx.beginPath();
                const x=Math.random()*s, y=Math.random()*s;
                ctx.moveTo(x,y+6); ctx.lineTo(x+(Math.random()-.5)*4,y); ctx.stroke();
            }
        });
        const sandTex = makeCanvas(256, (ctx, s) => {
            ctx.fillStyle = '#c8a86a'; ctx.fillRect(0,0,s,s);
            for (let i=0;i<3000;i++) {
                const x=Math.random()*s, y=Math.random()*s, g=Math.random()*30-15;
                ctx.fillStyle=`rgba(${190+g},${160+g},${90+g},0.5)`; ctx.fillRect(x,y,1+Math.random()*2,1+Math.random()*2);
            }
        });
        const dirtTex = makeCanvas(256, (ctx, s) => {
            ctx.fillStyle = '#7a8a5a'; ctx.fillRect(0,0,s,s);
            for (let i=0;i<2500;i++) {
                const x=Math.random()*s, y=Math.random()*s, g=Math.random()*25-12;
                ctx.fillStyle=`rgba(${100+g},${120+g},${70+g},0.6)`; ctx.fillRect(x,y,1+Math.random()*3,1+Math.random()*3);
            }
        });
        const stoneTex = makeCanvas(128, (ctx, s) => {
            ctx.fillStyle = '#aaa'; ctx.fillRect(0,0,s,s);
            for (let i=0;i<800;i++) {
                const x=Math.random()*s, y=Math.random()*s, g=Math.random()*40-20;
                ctx.fillStyle=`rgba(${160+g},${160+g},${160+g},0.5)`; ctx.fillRect(x,y,2+Math.random()*4,2+Math.random()*4);
            }
        });
        const woodTex = makeCanvas(128, (ctx, s) => {
            for (let y=0;y<s;y++) {
                const g=Math.sin(y*0.3)*15;
                ctx.fillStyle=`rgb(${160+g},${110+g},${60+g})`; ctx.fillRect(0,y,s,1);
            }
            for (let i=0;i<50;i++) {
                const x=Math.random()*s;
                ctx.strokeStyle=`rgba(100,60,20,0.2)`; ctx.lineWidth=Math.random()*1.5;
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+(Math.random()-.5)*6,s); ctx.stroke();
            }
        });
        const brickTex = makeCanvas(128, (ctx, s) => {
            ctx.fillStyle='#888'; ctx.fillRect(0,0,s,s);
            const bH=12, bW=24;
            for (let row=0; row*bH<s; row++) {
                const offset=(row%2)*(bW/2);
                for (let col=-1; col*bW<s+bW; col++) {
                    const x=col*bW+offset, y=row*bH, g=Math.random()*20-10;
                    ctx.fillStyle=`rgb(${140+g},${130+g},${120+g})`; ctx.fillRect(x+1,y+1,bW-2,bH-2);
                }
            }
        });
        const foliageTex = makeCanvas(64, (ctx, s) => {
            ctx.fillStyle='#3a7a30'; ctx.fillRect(0,0,s,s);
            for (let i=0;i<400;i++) {
                const x=Math.random()*s, y=Math.random()*s, g=Math.random()*30-15;
                ctx.fillStyle=`rgba(${40+g},${100+g},${30+g},0.7)`; ctx.fillRect(x,y,2+Math.random()*3,2+Math.random()*3);
            }
        });

        // ── SKY DOME ─────────────────────────────────────────────────────────────
        let skyDome = null;
        function createSkyDome(topColor, horizColor) {
            if (skyDome) { scene.remove(skyDome); skyDome.geometry.dispose(); skyDome.material.dispose(); }
            const geo = new THREE.SphereGeometry(180, 32, 16);
            const colors = [];
            const pos = geo.attributes.position;
            for (let i=0;i<pos.count;i++) {
                const t = Math.max(0, Math.min(1, (pos.getY(i)+10)/70));
                const c = new THREE.Color(horizColor).lerp(new THREE.Color(topColor), t);
                colors.push(c.r, c.g, c.b);
            }
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            skyDome = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide }));
            scene.add(skyDome);
        }

        // ── GUN MODEL ────────────────────────────────────────────────────────────
        let gunGroup = null, gunBobTime = 0, recoilAmount = 0;
        const gunBasePos = new THREE.Vector3(0.22, -0.22, -0.42);

        function createGunModel(type) {
            if (gunGroup) camera.remove(gunGroup);
            gunGroup = new THREE.Group();
            if (type === 'assault') {
                const bMat = new THREE.MeshStandardMaterial({ color:0x222222, roughness:0.4, metalness:0.7 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.055,0.34), bMat);
                gunGroup.add(body);
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.011,0.011,0.24,8), new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.3,metalness:0.9}));
                barrel.rotation.x = Math.PI/2; barrel.position.set(0,0.01,-0.28); gunGroup.add(barrel);
                const stock = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.04,0.1), bMat);
                stock.position.set(0,-0.01,0.22); gunGroup.add(stock);
                const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.09,0.04), new THREE.MeshStandardMaterial({color:0x111111,roughness:0.7}));
                grip.position.set(0,-0.07,0.05); grip.rotation.x=0.18; gunGroup.add(grip);
                const mag = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.08,0.035), new THREE.MeshStandardMaterial({color:0x333333,roughness:0.5}));
                mag.position.set(0,-0.09,-0.04); mag.rotation.x=0.12; gunGroup.add(mag);
                const rail = new THREE.Mesh(new THREE.BoxGeometry(0.015,0.01,0.18), new THREE.MeshStandardMaterial({color:0x444444,roughness:0.3,metalness:0.8}));
                rail.position.set(0,0.033,-0.05); gunGroup.add(rail);
                const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.016,0.013,0.04,8), new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.3,metalness:0.9}));
                muzzle.rotation.x=Math.PI/2; muzzle.position.set(0,0.01,-0.39); gunGroup.add(muzzle);
            } else {
                const bMat = new THREE.MeshStandardMaterial({color:0x2a1a0a,roughness:0.8,metalness:0.15});
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.06,0.42), bMat);
                gunGroup.add(body);
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.28,8), new THREE.MeshStandardMaterial({color:0x888888,roughness:0.3,metalness:0.9}));
                barrel.rotation.x=Math.PI/2; barrel.position.set(0,0.025,-0.28); gunGroup.add(barrel);
                const stock = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.05,0.14), bMat);
                stock.position.set(0,-0.005,0.28); gunGroup.add(stock);
                const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.1,0.05), new THREE.MeshStandardMaterial({color:0x1a0a00,roughness:0.9}));
                grip.position.set(0,-0.08,0.06); gunGroup.add(grip);
                const pump = new THREE.Mesh(new THREE.BoxGeometry(0.065,0.045,0.09), new THREE.MeshStandardMaterial({color:0x553322,roughness:0.7}));
                pump.position.set(0,0.005,-0.1); gunGroup.add(pump);
            }
            gunGroup.position.copy(gunBasePos);
            camera.add(gunGroup);
        }

        // 3D muzzle flash
        const muzzleFlashGeo = new THREE.PlaneGeometry(0.06,0.06);
        const muzzleFlashMat = new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true,opacity:0,depthWrite:false,side:THREE.DoubleSide});
        const muzzleFlash3D = new THREE.Mesh(muzzleFlashGeo, muzzleFlashMat);
        let muzzleFlashTO = null;

        function showMuzzleFlash() {
            const el = document.getElementById('muzzleFlash');
            el.style.opacity = '1'; setTimeout(()=>el.style.opacity='0', 40);
            if (gunGroup) {
                muzzleFlash3D.position.set(0,0.01,-0.45); muzzleFlash3D.rotation.z=Math.random()*Math.PI;
                gunGroup.add(muzzleFlash3D); muzzleFlashMat.opacity=0.9;
                if (muzzleFlashTO) clearTimeout(muzzleFlashTO);
                muzzleFlashTO = setTimeout(()=>{ muzzleFlashMat.opacity=0; gunGroup.remove(muzzleFlash3D); }, 45);
            }
        }

        function updateGun(delta, isMoving) {
            if (!gunGroup) return;
            if (isMoving) gunBobTime += delta * 8;
            const bobY = isMoving ? Math.sin(gunBobTime)*0.008 : 0;
            const bobX = isMoving ? Math.cos(gunBobTime*0.5)*0.004 : 0;
            recoilAmount *= 0.88;
            gunGroup.position.set(gunBasePos.x+bobX, gunBasePos.y+bobY, gunBasePos.z+recoilAmount);
        }

        function triggerRecoil() {
            recoilAmount = 0.04;
            renderer.domElement.classList.remove('recoil');
            void renderer.domElement.offsetWidth;
            renderer.domElement.classList.add('recoil');
        }

        // ── BULLET TRACERS ───────────────────────────────────────────────────────
        const tracers = [];
        function spawnTracer(origin, dir) {
            const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-6)]);
            const mat = new THREE.LineBasicMaterial({color:0xffee88,transparent:true,opacity:0.85});

        function updateTracers(delta) {
            for (let i=tracers.length-1;i>=0;i--) {
                const t=tracers[i]; t.life-=delta;
                t.mat.opacity=Math.max(0,t.life/t.maxLife)*0.85;
                if (t.life<=0) { scene.remove(t.mesh); t.mesh.geometry.dispose(); t.mat.dispose(); tracers.splice(i,1); }
            }
        }

        function flashEnemy(enemy) {
            enemy.mesh.traverse(c=>{
                if (c.isMesh && c.material && c.material.color) {
                    const orig=c.material.color.getHex();
                    c.material.color.setHex(0xffffff);
                    setTimeout(()=>c.material.color.setHex(orig), 80);
                }
            });
            enemy.mesh.scale.set(1.08,1.08,1.08);
            setTimeout(()=>enemy.mesh.scale.set(1,1,1), 80);
        }

        function animateEnemies(delta) {
            for (const e of enemies) {
                e.bobTime+=delta*4;
                e.mesh.position.y=Math.abs(Math.sin(e.bobTime))*0.04;
                const dx=player.x-e.x, dz=player.z-e.z;
                e.mesh.rotation.y=Math.atan2(dx,dz);
                if (e.mesh.children[0]) e.mesh.children[0].rotation.z=Math.sin(e.bobTime)*0.025;
            }
        }

        // ── WORLD CLEANUP ────────────────────────────────────────────────────────
        function clearWorld() {
            dynamicObjects.forEach(obj=>{
                if (obj.parent) scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose());
                else if (obj.material) obj.material.dispose();
            });
            dynamicObjects=[]; collisionBlocks=[];
            enemies.forEach(e=>{
                if (e.mesh.parent) scene.remove(e.mesh);
                e.mesh.traverse(c=>{ if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose(); });
            });
            enemies=[];
            tracers.forEach(t=>{ scene.remove(t.mesh); t.mesh.geometry.dispose(); t.mat.dispose(); });
            tracers.length=0;
            if (skyDome) { scene.remove(skyDome); skyDome.geometry.dispose(); skyDome.material.dispose(); skyDome=null; }
            centerZone=null;
        }

        // ── GAME FLOW ────────────────────────────────────────────────────────────
        function startGame(mapType, weapon, armor) {
            clearWorld();
            gameActive=true; currentWeapon=weapon;
            const stats=WEAPONS[weapon];
            ammo=stats.magSize; reserve=stats.reserve; reloading=false; killCount=0;
            player.hp=armor==="light"?100:170; player.maxHp=player.hp;
            player.speed=armor==="light"?5.2:3.8;
            camera.position.set(12,1.6,12); player.x=12; player.z=12; camera.rotation.set(0,0,0);
            if (mapType==="school") buildSchool();
            else if (mapType==="military") buildMilitary();
            else if (mapType==="forest") buildForest();
            else if (mapType==="temple") buildTemple();
            spawnEnemies(6);
            createGunModel(weapon);
            updateUI(); hideReloadUI();
        }

        function showReloadUI(duration) {
            document.getElementById('reloadLabel').style.display='block';
            document.getElementById('reloadBar').style.display='block';
            document.getElementById('reloadFill').style.width='0%';
            const start=performance.now();
            function tick() {
                if (!reloading) { hideReloadUI(); return; }
                const pct=Math.min(100,(performance.now()-start)/duration*100);
                document.getElementById('reloadFill').style.width=pct+'%';
                if (pct<100) requestAnimationFrame(tick); else hideReloadUI();
            }
            tick();
        }

        function hideReloadUI() {
            document.getElementById('reloadLabel').style.display='none';
            document.getElementById('reloadBar').style.display='none';
        }

        function updateUI() {
            document.getElementById("hpFill").style.width=(player.hp/player.maxHp*100)+"%";
            document.getElementById("ammo").innerText=ammo;
            document.getElementById("reserve").innerText=reserve;
            document.getElementById("killCount").innerText=killCount;
            document.getElementById("enemyCount").innerText=enemies.length;
            document.getElementById("weaponName").innerText=WEAPONS[currentWeapon].name;
        }

        function showHitMarker() {
            const hm=document.getElementById('hitMarker');
            hm.style.opacity='1'; setTimeout(()=>hm.style.opacity='0', 90);
        }

        function shoot() {
            if (reloading||ammo<=0||!gameActive) return;
            const now=performance.now(), stats=WEAPONS[currentWeapon];
            if (now-lastShoot<stats.fireRate) return;
            lastShoot=now;
            showMuzzleFlash(); triggerRecoil();
            const dir=new THREE.Vector3(0,0,-1).applyEuler(camera.rotation);
            spawnTracer(camera.position.clone().add(new THREE.Vector3(0.1,-0.1,0)), dir);
            const raycaster=new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const meshes=[]; enemies.forEach(e=>e.mesh.traverse(c=>{ if(c.isMesh) meshes.push(c); }));
            const hits=raycaster.intersectObjects(meshes);
            if (hits.length>0) {
                const hitObj=hits[0].object;
                const hitEnemy=enemies.find(e=>{ let f=false; e.mesh.traverse(c=>{ if(c===hitObj) f=true; }); return f; });
                if (hitEnemy) {
                    hitEnemy.hp-=stats.damage; showHitMarker();
                    if (hitEnemy.hp<=0) {
                        scene.remove(hitEnemy.mesh);
                        hitEnemy.mesh.traverse(c=>{ if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose(); });
                        enemies=enemies.filter(e=>e!==hitEnemy); killCount++;
                        document.getElementById("killFeed").innerHTML=`⚔️ ELIMINATED ${hitEnemy.type.toUpperCase()}`;
                        setTimeout(()=>document.getElementById("killFeed").innerHTML="⚔️ FIGHT TO THE ZONE",1500);
                        updateUI();
                    } else { flashEnemy(hitEnemy); }
                    document.getElementById("damageOverlay").style.opacity="0.4";
                    setTimeout(()=>document.getElementById("damageOverlay").style.opacity="0",100);
                }
            }
            ammo--; updateUI();
            if (ammo===0&&reserve>0) reloadWeapon();
        }

        function reloadWeapon() {
            if (reloading) return;
            const stats=WEAPONS[currentWeapon];
            if (ammo===stats.magSize||reserve===0) return;
            reloading=true; showReloadUI(stats.reloadTime);
            setTimeout(()=>{
                const take=Math.min(stats.magSize-ammo,reserve);
                ammo+=take; reserve-=take; reloading=false; hideReloadUI(); updateUI();
            }, stats.reloadTime);
        }

        function updateMovement(delta) {
            if (!gameActive) return;
            let moveX=0, moveZ=0;
            if (move.f) moveZ-=1; if (move.b) moveZ+=1;
            if (move.l) moveX-=1; if (move.r) moveX+=1;
            const isMoving=moveX!==0||moveZ!==0;
            if (isMoving) { const len=Math.hypot(moveX,moveZ); moveX/=len; moveZ/=len; }
            const fwd=new THREE.Vector3(-Math.sin(camera.rotation.y),0,-Math.cos(camera.rotation.y));
            const rgt=new THREE.Vector3(Math.cos(camera.rotation.y),0,-Math.sin(camera.rotation.y));
            const newX=camera.position.x+(fwd.x*(-moveZ)+rgt.x*moveX)*player.speed*delta;
            const newZ=camera.position.z+(fwd.z*(-moveZ)+rgt.z*moveX)*player.speed*delta;
            let col=false;
            for (const b of collisionBlocks) { if(newX>b.x1&&newX<b.x2&&newZ>b.z1&&newZ<b.z2){col=true;break;} }
            if (!col&&Math.abs(newX)<45&&Math.abs(newZ)<45) { camera.position.x=newX; camera.position.z=newZ; }
            player.x=camera.position.x; player.z=camera.position.z;
            updateGun(delta, isMoving);
            if (centerZone&&Math.hypot(player.x-centerZone.mesh.position.x,player.z-centerZone.mesh.position.z)<centerZone.radius) {
                gameActive=false;
                document.getElementById("endTitle").innerHTML="🏆 VICTORY!";
                document.getElementById("endMsg").innerHTML=`Zone reached! Kills: ${killCount}`;
                document.getElementById("endScreen").classList.add("active"); return;
            }
            for (const e of enemies) {
                const dx=player.x-e.x, dz=player.z-e.z, dist=Math.hypot(dx,dz);
                if (dist>0.3) {
                    const mx=(dx/dist)*e.speed*delta, mz=(dz/dist)*e.speed*delta;
                    const nx=e.x+mx, nz=e.z+mz;
                    let blocked=false;
                    for (const b of collisionBlocks) { if(nx>b.x1&&nx<b.x2&&nz>b.z1&&nz<b.z2){blocked=true;break;} }
                    if (!blocked&&Math.abs(nx)<45&&Math.abs(nz)<45) { e.x=nx; e.z=nz; e.mesh.position.set(e.x,e.mesh.position.y,e.z); }
                }
                if (dist<1.5&&e.attackCd<=0) {
                    player.hp-=15; updateUI(); e.attackCd=1.2;
                    document.getElementById("damageOverlay").style.opacity="0.5";
                    setTimeout(()=>document.getElementById("damageOverlay").style.opacity="0",150);
                    if (player.hp<=0) {
                        gameActive=false;
                        document.getElementById("endTitle").innerHTML="💀 DEFEAT";
                        document.getElementById("endMsg").innerHTML=`You were slain. Kills: ${killCount}`;
                        document.getElementById("endScreen").classList.add("active");
                    }
                } else if (e.attackCd>0) e.attackCd-=delta;
            }
        }

        // ── CONTROLS ─────────────────────────────────────────────────────────────
        document.addEventListener("keydown", e=>{
            if (!gameActive) return;
            if(e.code==="KeyW") move.f=true; if(e.code==="KeyS") move.b=true;
            if(e.code==="KeyA") move.l=true; if(e.code==="KeyD") move.r=true;
            if(e.code==="KeyR") reloadWeapon();
        });
        document.addEventListener("keyup", e=>{
            if(e.code==="KeyW") move.f=false; if(e.code==="KeyS") move.b=false;
            if(e.code==="KeyA") move.l=false; if(e.code==="KeyD") move.r=false;
        });
        document.addEventListener("mousemove", e=>{
            if (document.pointerLockElement===renderer.domElement&&gameActive) {
                camera.rotation.y-=e.movementX*0.002;
                camera.rotation.x-=e.movementY*0.002;
                camera.rotation.x=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,camera.rotation.x));
            }
        });
        renderer.domElement.addEventListener("click", ()=>renderer.domElement.requestPointerLock());
        document.addEventListener("mousedown", e=>{ if(e.button===0&&gameActive) shoot(); });
        window.addEventListener("resize", ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

        // ── GAME LOOP ────────────────────────────────────────────────────────────
        let lastTime=performance.now();
        function animate() {
            const now=performance.now();
            const delta=Math.min(0.033,(now-lastTime)/1000);
            lastTime=now;
            if (gameActive) { updateMovement(delta); animateEnemies(delta); animateZone(delta); updateTracers(delta); }
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        // ── UI BINDINGS ──────────────────────────────────────────────────────────
        document.getElementById("deployBtn").onclick = () => {
            const map=document.querySelector(".map-card[data-map].selected")?.dataset.map||"school";
            const weapon=document.querySelector(".map-card[data-weapon].selected")?.dataset.weapon||"assault";
            const armor=document.querySelector(".map-card[data-armor].selected")?.dataset.armor||"light";
            document.getElementById("loadoutScreen").classList.remove("active");
            startGame(map,weapon,armor);
        };
        document.getElementById("playAgainBtn").onclick = () => { document.getElementById("endScreen").classList.remove("active"); document.getElementById("loadoutScreen").classList.add("active"); };
        document.getElementById("menuBtn").onclick = () => { document.getElementById("endScreen").classList.remove("active"); document.getElementById("loadoutScreen").classList.add("active"); };
        document.getElementById("logoutBtn").onclick = () => signOut(auth);

        document.querySelectorAll(".map-card[data-map]").forEach(el=>el.addEventListener("click",()=>{ document.querySelectorAll(".map-card[data-map]").forEach(c=>c.classList.remove("selected")); el.classList.add("selected"); }));
        document.querySelectorAll(".map-card[data-weapon]").forEach(el=>el.addEventListener("click",()=>{ document.querySelectorAll(".map-card[data-weapon]").forEach(c=>c.classList.remove("selected")); el.classList.add("selected"); }));
        document.querySelectorAll(".map-card[data-armor]").forEach(el=>el.addEventListener("click",()=>{ document.querySelectorAll(".map-card[data-armor]").forEach(c=>c.classList.remove("selected")); el.classList.add("selected"); }));

        document.getElementById("tabLogin").onclick = () => {
            document.getElementById("loginPanel").style.display="block"; document.getElementById("registerPanel").style.display="none";
            document.getElementById("tabLogin").style.cssText+="border-bottom:2px solid #0f8;color:#0f8;";
            document.getElementById("tabReg").style.cssText+="border-bottom:none;color:#888;";
        };
        document.getElementById("tabReg").onclick = () => {
            document.getElementById("loginPanel").style.display="none"; document.getElementById("registerPanel").style.display="block";
            document.getElementById("tabReg").style.cssText+="border-bottom:2px solid #0f8;color:#0f8;";
            document.getElementById("tabLogin").style.cssText+="border-bottom:none;color:#888;";
        };
        document.getElementById("loginBtn").onclick = async () => {
            try { await signInWithEmailAndPassword(auth,document.getElementById("loginEmail").value,document.getElementById("loginPass").value); }
            catch(e) { document.getElementById("loginError").innerText=e.message; }
        };
        document.getElementById("regBtn").onclick = async () => {
            const name=document.getElementById("regName").value, email=document.getElementById("regEmail").value, pass=document.getElementById("regPass").value;
            if (pass.length<6) return;
            try {
                const cred=await createUserWithEmailAndPassword(auth,email,pass);
                await updateProfile(cred.user,{displayName:name});
                await set(ref(db,`users/${cred.user.uid}`),{username:name});
            } catch(e) { document.getElementById("regError").innerText=e.message; }
        };
        onAuthStateChanged(auth, user=>{
            if (user) { document.getElementById("authScreen").classList.remove("active"); document.getElementById("loadoutScreen").classList.add("active"); }
            else { document.getElementById("authScreen").classList.add("active"); document.getElementById("loadoutScreen").classList.remove("active"); document.getElementById("endScreen").classList.remove("active"); gameActive=false; }
        });

        document.querySelector(".map-card[data-map='school']").classList.add("selected");
        document.querySelector(".map-card[data-weapon='assault']").classList.add("selected");
        document.querySelector(".map-card[data-armor='light']").classList.add("selected");
    </script>
</body>
</html>
