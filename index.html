<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>APEX RUSH 3D — SVK presents</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', monospace; }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 8px;
            color: #0f8;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
            font-weight: bold;
        }
        .panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 12px;
            border-left: 3px solid #0f8;
            color: white;
        }
        .hp-bar {
            width: 180px;
            height: 6px;
            background: #600;
            border-radius: 3px;
            margin-top: 4px;
        }
        .hp-fill {
            height: 100%;
            width: 100%;
            background: #0f8;
            border-radius: 3px;
            transition: width 0.1s;
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }
        .damage {
            position: absolute;
            inset: 0;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 90;
        }
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            flex-direction: column;
        }
        .screen.active { display: flex; }
        .glass {
            background: rgba(20,30,45,0.95);
            border-radius: 24px;
            padding: 28px;
            width: 380px;
            text-align: center;
            border: 1px solid #0f8;
        }
        input, button {
            background: #11212e;
            border: 1px solid #2c6e4e;
            padding: 8px 12px;
            margin: 6px 0;
            width: 100%;
            color: white;
            border-radius: 40px;
            font-family: monospace;
        }
        button {
            background: #1a3a2a;
            cursor: pointer;
        }
        .map-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .map-card {
            background: #0a1822;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #2e6e5a;
        }
        .map-card.selected {
            background: #1e4a3a;
            border-color: #0f8;
        }
        .kill-feed {
            position: absolute;
            top: 70px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffaa66;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">⚡ APEX RUSH 3D | SVK presents</div>
    <div class="hud">
        <div class="panel">
            ❤️ HEALTH <div class="hp-bar"><div id="hpFill" class="hp-fill" style="width:100%"></div></div>
            <div>🔫 <span id="weaponName">ASSAULT</span> &nbsp; <span id="ammo">30</span>/<span id="reserve">120</span></div>
        </div>
        <div class="panel">
            🔪 KILLS: <span id="killCount">0</span> &nbsp;|&nbsp; 👾 <span id="enemyCount">0</span>
        </div>
    </div>
    <div class="crosshair"></div>
    <div class="damage" id="damageOverlay"></div>
    <div class="kill-feed" id="killFeed">⚔️ FIGHT TO THE ZONE</div>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="screen active">
        <div class="glass">
            <h2 style="color:#0f8;">APEX RUSH 3D</h2>
            <div style="display:flex; gap:20px; margin:20px 0;">
                <span id="tabLogin" style="border-bottom:2px solid #0f8; cursor:pointer;">LOGIN</span>
                <span id="tabReg" style="cursor:pointer;">REGISTER</span>
            </div>
            <div id="loginPanel">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPass" placeholder="Password">
                <div id="loginError" style="color:#ff8866;"></div>
                <button id="loginBtn">▶ ENTER</button>
            </div>
            <div id="registerPanel" style="display:none;">
                <input id="regName" placeholder="Username">
                <input id="regEmail" placeholder="Email">
                <input id="regPass" type="password" placeholder="Password (min 6)">
                <div id="regError" style="color:#ff8866;"></div>
                <button id="regBtn">CREATE</button>
            </div>
        </div>
    </div>

    <!-- LOADOUT SCREEN -->
    <div id="loadoutScreen" class="screen">
        <div class="glass" style="width:500px;">
            <h2>🔥 LOADOUT</h2>
            <div>🌍 MAP</div>
            <div class="map-row">
                <div class="map-card" data-map="school">🏫 SCHOOL</div>
                <div class="map-card" data-map="military">🏛️ MILITARY</div>
                <div class="map-card" data-map="forest">🌲 FOREST</div>
                <div class="map-card" data-map="temple">🛕 TEMPLE</div>
            </div>
            <div>🔫 WEAPON</div>
            <div class="map-row">
                <div class="map-card" data-weapon="assault">ASSAULT</div>
                <div class="map-card" data-weapon="shotgun">SHOTGUN</div>
            </div>
            <div>🛡️ ARMOR</div>
            <div class="map-row">
                <div class="map-card" data-armor="light">LIGHT (speed)</div>
                <div class="map-card" data-armor="heavy">HEAVY (tank)</div>
            </div>
            <button id="deployBtn">⚔️ DEPLOY ⚔️</button>
            <button id="logoutBtn" style="border-color:#ff4466;">LOGOUT</button>
        </div>
    </div>

    <!-- END SCREEN -->
    <div id="endScreen" class="screen">
        <div class="glass">
            <div id="endTitle" style="font-size:28px;">💀 DEFEAT</div>
            <div id="endMsg"></div>
            <button id="playAgainBtn">PLAY AGAIN</button>
            <button id="menuBtn">MENU</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCZ_Itzqsj9aHhFdnHrXZG061aWZedvJ94",
            authDomain: "apex-rush-game.firebaseapp.com",
            projectId: "apex-rush-game",
            storageBucket: "apex-rush-game.firebasestorage.app",
            messagingSenderId: "551986148656",
            appId: "1:551986148656:web:7b763ed3e83016f16b44f5"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ------------------- THREE.JS SETUP -------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1a2a);
        scene.fog = new THREE.FogExp2(0x0a1a2a, 0.008);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.y = 1.6;
        camera.position.x = 12;
        camera.position.z = 12;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Improved lighting
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        sunLight.position.set(15, 20, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0x5577aa, 0.5);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(-5, 3, -8);
        scene.add(backLight);

        // Ambient particles (dust motes)
        const particleCount = 400;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 60;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 60;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.08, transparent: true, opacity: 0.4 });
        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        // Game state
        let gameActive = false;
        let player = { x: camera.position.x, z: camera.position.z, hp: 100, maxHp: 100, speed: 5.2 };
        let move = { f: false, b: false, l: false, r: false };
        let currentWeapon = "assault";
        let ammo = 30, reserve = 120, reloading = false;
        let lastShoot = 0;
        let killCount = 0;
        let enemies = [];
        let collisionBlocks = [];
        let centerZone = null;
        let currentMapType = "school";

        const WEAPONS = {
            assault: { name: "ASSAULT", damage: 28, fireRate: 140, magSize: 30, reserve: 120, reloadTime: 1200, range: 35 },
            shotgun: { name: "SHOTGUN", damage: 85, fireRate: 800, magSize: 6, reserve: 24, reloadTime: 1600, range: 18, pellets: 5 }
        };

        // Enhanced object creation functions
        function createDesk(x, z, rotationY = 0) {
            const group = new THREE.Group();
            const top = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.1, 0.7), new THREE.MeshStandardMaterial({ color: 0xcbb88e, roughness: 0.6, metalness: 0.1 }));
            top.position.y = 0.65;
            top.castShadow = true;
            group.add(top);
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.55, 0.05), new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.8 }));
            leg.position.y = 0.3;
            leg.castShadow = true;
            group.add(leg);
            group.position.set(x, 0, z);
            group.rotation.y = rotationY;
            scene.add(group);
            collisionBlocks.push({ x1: x-0.6, x2: x+0.6, z1: z-0.5, z2: z+0.5 });
        }

        function createBench(x, z, rotationY = 0) {
            const group = new THREE.Group();
            const seat = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.6), new THREE.MeshStandardMaterial({ color: 0xbc9a6c, roughness: 0.7 }));
            seat.position.y = 0.4;
            seat.castShadow = true;
            group.add(seat);
            const legs = [[-0.5,0.2,-0.25],[0.5,0.2,-0.25],[-0.5,0.2,0.25],[0.5,0.2,0.25]];
            legs.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.9 }));
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            group.position.set(x, 0, z);
            group.rotation.y = rotationY;
            scene.add(group);
            collisionBlocks.push({ x1: x-0.7, x2: x+0.7, z1: z-0.4, z2: z+0.4 });
        }

        function createTeacherDesk(x, z) {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.2, 1.0), new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.5 }));
            base.position.y = 0.5;
            base.castShadow = true;
            group.add(base);
            const top = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 1.0), new THREE.MeshStandardMaterial({ color: 0xddbb99 }));
            top.position.y = 0.65;
            top.castShadow = true;
            group.add(top);
            group.position.set(x, 0, z);
            scene.add(group);
            collisionBlocks.push({ x1: x-0.8, x2: x+0.8, z1: z-0.6, z2: z+0.6 });
        }

        function createTree(x, z, size = 1) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4 * size, 0.6 * size, 1.2 * size, 6), new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.9 }));
            trunk.position.set(x, 0.6 * size, z);
            trunk.castShadow = true;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.8 * size, 1.0 * size, 6), new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.4 }));
            leaves.position.set(x, 1.2 * size, z);
            leaves.castShadow = true;
            scene.add(trunk, leaves);
            collisionBlocks.push({ x1: x-0.5*size, x2: x+0.5*size, z1: z-0.5*size, z2: z+0.5*size });
        }

        function createRock(x, z, size = 0.4) {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(size), new THREE.MeshStandardMaterial({ color: 0x887766, roughness: 0.8 }));
            rock.position.set(x, size*0.5, z);
            rock.castShadow = true;
            scene.add(rock);
            collisionBlocks.push({ x1: x-size-0.1, x2: x+size+0.1, z1: z-size-0.1, z2: z+size+0.1 });
        }

        function createCrate(x, z) {
            const crate = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 1.2), new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 }));
            crate.position.set(x, 0.4, z);
            crate.castShadow = true;
            scene.add(crate);
            collisionBlocks.push({ x1: x-0.7, x2: x+0.7, z1: z-0.7, z2: z+0.7 });
        }

        function createPillar(x, z, color = 0xccaa88) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3.0, 0.8), new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 }));
            pillar.position.set(x, 1.5, z);
            pillar.castShadow = true;
            scene.add(pillar);
            collisionBlocks.push({ x1: x-0.5, x2: x+0.5, z1: z-0.5, z2: z+0.5 });
        }

        function addWall(x1, z1, x2, z2, height = 2.5, materialColor = 0x9aacbb) {
            const length = Math.hypot(x2-x1, z2-z1);
            const angle = Math.atan2(z2-z1, x2-x1);
            const wall = new THREE.Mesh(new THREE.BoxGeometry(length, height, 0.3), new THREE.MeshStandardMaterial({ color: materialColor, roughness: 0.6 }));
            wall.position.set((x1+x2)/2, height/2, (z1+z2)/2);
            wall.rotation.y = angle;
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            const minX = Math.min(x1, x2)-0.2, maxX = Math.max(x1, x2)+0.2;
            const minZ = Math.min(z1, z2)-0.2, maxZ = Math.max(z1, z2)+0.2;
            collisionBlocks.push({ x1: minX, x2: maxX, z1: minZ, z2: maxZ });
        }

        function addFloorTile(x, z, size, color) {
            const tile = new THREE.Mesh(new THREE.PlaneGeometry(size, size), new THREE.MeshStandardMaterial({ color: color, roughness: 0.7, metalness: 0.05 }));
            tile.rotation.x = -Math.PI/2;
            tile.position.set(x, -0.08, z);
            tile.receiveShadow = true;
            scene.add(tile);
        }

        // Map generators with enhanced realism
        function buildSchool() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(70, 70), new THREE.MeshStandardMaterial({ color: 0x6a8e6a, roughness: 0.8 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            // Floor tiles inside school area
            for (let i = -14; i <= 14; i+=2) {
                for (let j = -12; j <= 12; j+=2) {
                    if (Math.abs(i) < 15 && Math.abs(j) < 13) {
                        addFloorTile(i, j, 1.8, (i+j) % 4 === 0 ? 0x8aae8a : 0x6a8e6a);
                    }
                }
            }
            // Walls
            addWall(-18, -15, 18, -15, 3, 0x8a9eb0);
            addWall(-18, 15, 18, 15, 3, 0x8a9eb0);
            addWall(-18, -15, -18, 15, 3, 0x8a9eb0);
            addWall(18, -15, 18, 15, 3, 0x8a9eb0);
            // Classrooms: 4 rows of desks, 3 columns
            for (let row = -8; row <= 8; row += 3.5) {
                for (let col = -10; col <= 10; col += 3) {
                    if (Math.abs(row) < 12 && Math.abs(col) < 13) createDesk(col, row);
                }
            }
            // Benches along walls
            for (let i = -12; i <= 12; i+=2.5) createBench(i, -11);
            for (let i = -12; i <= 12; i+=2.5) createBench(i, 11);
            // Teacher desk at front (z = -12)
            createTeacherDesk(0, -12);
            // Blackboard
            const board = new THREE.Mesh(new THREE.BoxGeometry(5, 1.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x2c3e2e, roughness: 0.2 }));
            board.position.set(0, 1.2, -14.2);
            board.castShadow = true;
            scene.add(board);
            // Corridor pillars
            for (let x = -12; x <= 12; x+=6) createPillar(x, 0);
            // Center zone
            const zone = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 3.2, 0.2, 24), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200, metalness: 0.3 }));
            zone.position.set(0, 0, 0);
            zone.castShadow = true;
            scene.add(zone);
            centerZone = { mesh: zone, radius: 3.2 };
        }

        function buildMilitary() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({ color: 0x8a9a6e, roughness: 0.9 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            // Dust patches
            for (let i = 0; i < 120; i++) {
                const x = (Math.random() - 0.5) * 70;
                const z = (Math.random() - 0.5) * 70;
                const patch = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2), new THREE.MeshStandardMaterial({ color: 0x7a8a5e, roughness: 0.9 }));
                patch.rotation.x = -Math.PI/2;
                patch.position.set(x, -0.09, z);
                patch.receiveShadow = true;
                scene.add(patch);
            }
            // Barracks / crates
            for (let i = -14; i <= 14; i+=3.5) {
                createCrate(i, -12);
                createCrate(i, 12);
            }
            // Barriers (concrete blocks)
            for (let i = -15; i <= 15; i+=5) {
                const barrier = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 1.0), new THREE.MeshStandardMaterial({ color: 0x9aaeae, roughness: 0.7 }));
                barrier.position.set(i, 0.3, -9);
                barrier.castShadow = true;
                scene.add(barrier);
                collisionBlocks.push({ x1: i-0.9, x2: i+0.9, z1: -9.5, z2: -8.5 });
            }
            // Watchtowers
            for (let s = -1; s <= 1; s+=2) {
                const towerBase = new THREE.Mesh(new THREE.BoxGeometry(1.8, 3.5, 1.8), new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.5 }));
                towerBase.position.set(s*24, 1.8, s*20);
                towerBase.castShadow = true;
                scene.add(towerBase);
                const towerTop = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 2.2), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
                towerTop.position.set(s*24, 3.8, s*20);
                towerTop.castShadow = true;
                scene.add(towerTop);
                collisionBlocks.push({ x1: s*24-1.2, x2: s*24+1.2, z1: s*20-1.2, z2: s*20+1.2 });
            }
            const zone = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.5, 0.2, 24), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
            zone.position.set(0, 0, 0);
            scene.add(zone);
            centerZone = { mesh: zone, radius: 3.5 };
        }

        function buildForest() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(90, 90), new THREE.MeshStandardMaterial({ color: 0x4a6741, roughness: 0.9 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            // Trees with size variation
            for (let i = 0; i < 120; i++) {
                let angle = Math.random() * Math.PI * 2;
                let r = 6 + Math.random() * 38;
                let x = Math.cos(angle) * r;
                let z = Math.sin(angle) * r;
                let size = 0.7 + Math.random() * 0.8;
                createTree(x, z, size);
            }
            // Rocks
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let r = 5 + Math.random() * 35;
                let x = Math.cos(angle) * r;
                let z = Math.sin(angle) * r;
                createRock(x, z, 0.3 + Math.random() * 0.3);
            }
            // Cabin
            const cabinBase = new THREE.Mesh(new THREE.BoxGeometry(3.2, 2.2, 3.2), new THREE.MeshStandardMaterial({ color: 0xbc9a6c, roughness: 0.7 }));
            cabinBase.position.set(-7, 0.5, -6);
            cabinBase.castShadow = true;
            scene.add(cabinBase);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(2.2, 1.5, 4), new THREE.MeshStandardMaterial({ color: 0xaa5555 }));
            roof.position.set(-7, 1.7, -6);
            roof.castShadow = true;
            scene.add(roof);
            collisionBlocks.push({ x1: -8.5, x2: -5.5, z1: -7.5, z2: -4.5 });
            const zone = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.2, 24), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
            zone.position.set(0, 0, 0);
            scene.add(zone);
            centerZone = { mesh: zone, radius: 3 };
        }

        function buildTemple() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(70, 70), new THREE.MeshStandardMaterial({ color: 0xcbb88e, roughness: 0.8 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            // Sandstone texture effect with small tiles
            for (let i = -30; i <= 30; i+=2.5) {
                for (let j = -30; j <= 30; j+=2.5) {
                    if (Math.hypot(i, j) > 8 && Math.hypot(i, j) < 32) {
                        const tile = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.8), new THREE.MeshStandardMaterial({ color: 0xdbba8e, roughness: 0.7 }));
                        tile.rotation.x = -Math.PI/2;
                        tile.position.set(i, -0.08, j);
                        tile.receiveShadow = true;
                        scene.add(tile);
                    }
                }
            }
            // Circular pillars
            for (let i = 0; i < 16; i++) {
                let angle = (i / 16) * Math.PI * 2;
                let x = Math.cos(angle) * 9;
                let z = Math.sin(angle) * 9;
                createPillar(x, z, 0xddbb99);
            }
            // Inner pillars
            for (let i = 0; i < 12; i++) {
                let angle = (i / 12) * Math.PI * 2;
                let x = Math.cos(angle) * 5.5;
                let z = Math.sin(angle) * 5.5;
                createPillar(x, z, 0xccaa88);
            }
            // Central shrine
            const shrineBase = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.6, 2.8), new THREE.MeshStandardMaterial({ color: 0xddbb88, metalness: 0.3 }));
            shrineBase.position.set(0, 0.3, 0);
            shrineBase.castShadow = true;
            scene.add(shrineBase);
            const shrineTop = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.6, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0xffcc88, metalness: 0.4 }));
            shrineTop.position.set(0, 0.9, 0);
            shrineTop.castShadow = true;
            scene.add(shrineTop);
            // Steps
            for (let i = 0; i < 3; i++) {
                const step = new THREE.Mesh(new THREE.BoxGeometry(3.2 - i*0.6, 0.2, 0.8), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
                step.position.set(0, 0.1 + i*0.2, 2.5 - i*0.5);
                step.castShadow = true;
                scene.add(step);
            }
            const zone = new THREE.Mesh(new THREE.CylinderGeometry(3.8, 3.8, 0.2, 24), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
            zone.position.set(0, 0, 0);
            scene.add(zone);
            centerZone = { mesh: zone, radius: 3.8 };
        }

        function clearWorld() {
            while(scene.children.length > 0) {
                const child = scene.children[0];
                if(child.isMesh && child !== particleSystem && child !== groundHelper && child !== sunLight && child !== ambient && child !== fillLight && child !== backLight) scene.remove(child);
                else if(child.isGroup) scene.remove(child);
                else if(child === particleSystem) {}
                else if(child !== renderer.domElement && child !== sunLight && child !== ambient && child !== fillLight && child !== backLight) scene.remove(child);
            }
            collisionBlocks = [];
            enemies = [];
            if(centerZone) scene.remove(centerZone.mesh);
        }

        function spawnEnemies(count) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let r = 6 + Math.random() * 14;
                let x = Math.cos(angle) * r;
                let z = Math.sin(angle) * r;
                const enemyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.8), new THREE.MeshStandardMaterial({ color: 0xff6666, roughness: 0.4 }));
                enemyMesh.position.set(x, 0.8, z);
                enemyMesh.castShadow = true;
                scene.add(enemyMesh);
                enemies.push({ mesh: enemyMesh, hp: 55, type: "monster", x, z, speed: 2.2, attackCd: 0 });
            }
            for (let i = 0; i < 3; i++) {
                let x = (Math.random() - 0.5) * 28;
                let z = (Math.random() - 0.5) * 28;
                const aiMesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.7, 0.9), new THREE.MeshStandardMaterial({ color: 0x88aaff, roughness: 0.3 }));
                aiMesh.position.set(x, 0.85, z);
                aiMesh.castShadow = true;
                scene.add(aiMesh);
                enemies.push({ mesh: aiMesh, hp: 75, type: "ai", x, z, speed: 1.8, attackCd: 0 });
            }
        }

        function startGame(mapType, weapon, armor) {
            try {
                clearWorld();
                gameActive = true;
                currentMapType = mapType;
                currentWeapon = weapon;
                const stats = WEAPONS[weapon];
                ammo = stats.magSize;
                reserve = stats.reserve;
                reloading = false;
                killCount = 0;
                player.hp = armor === "light" ? 100 : 170;
                player.maxHp = player.hp;
                player.speed = armor === "light" ? 5.2 : 3.8;
                camera.position.set(12, 1.6, 12);
                player.x = 12;
                player.z = 12;
                camera.rotation.set(0, 0, 0);
                
                if (mapType === "school") buildSchool();
                else if (mapType === "military") buildMilitary();
                else if (mapType === "forest") buildForest();
                else if (mapType === "temple") buildTemple();
                
                spawnEnemies(7);
                updateUI();
                // Add particle system back
                scene.add(particleSystem);
            } catch(e) {
                console.error("Start game error:", e);
                gameActive = false;
            }
        }

        function updateUI() {
            document.getElementById("hpFill").style.width = (player.hp / player.maxHp * 100) + "%";
            document.getElementById("ammo").innerText = ammo;
            document.getElementById("reserve").innerText = reserve;
            document.getElementById("killCount").innerText = killCount;
            document.getElementById("enemyCount").innerText = enemies.length;
            document.getElementById("weaponName").innerText = WEAPONS[currentWeapon].name;
        }

        function shoot() {
            if (reloading || ammo <= 0 || !gameActive) return;
            const now = performance.now();
            const stats = WEAPONS[currentWeapon];
            if (now - lastShoot < stats.fireRate) return;
            lastShoot = now;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh));
            if (intersects.length > 0) {
                const hitEnemy = enemies.find(e => e.mesh === intersects[0].object);
                if (hitEnemy) {
                    hitEnemy.hp -= stats.damage;
                    if (hitEnemy.hp <= 0) {
                        scene.remove(hitEnemy.mesh);
                        enemies = enemies.filter(e => e !== hitEnemy);
                        killCount++;
                        document.getElementById("killFeed").innerHTML = `⚔️ ELIMINATED ${hitEnemy.type.toUpperCase()}`;
                        setTimeout(() => document.getElementById("killFeed").innerHTML = "⚔️ FIGHT TO THE ZONE", 1500);
                        updateUI();
                    } else {
                        hitEnemy.mesh.material.color.setHex(0xff8888);
                        setTimeout(() => hitEnemy.mesh.material.color.setHex(0xff6666), 150);
                    }
                    document.getElementById("damageOverlay").style.opacity = "0.4";
                    setTimeout(() => document.getElementById("damageOverlay").style.opacity = "0", 100);
                }
            }
            ammo--;
            updateUI();
            if (ammo === 0 && reserve > 0) reloadWeapon();
        }

        function reloadWeapon() {
            if (reloading) return;
            const stats = WEAPONS[currentWeapon];
            if (ammo === stats.magSize || reserve === 0) return;
            reloading = true;
            setTimeout(() => {
                let needed = stats.magSize - ammo;
                let take = Math.min(needed, reserve);
                ammo += take;
                reserve -= take;
                reloading = false;
                updateUI();
            }, stats.reloadTime);
        }

        function updateMovement(delta) {
            if (!gameActive) return;
            let moveX = 0, moveZ = 0;
            if (move.f) moveZ -= 1;
            if (move.b) moveZ += 1;
            if (move.l) moveX -= 1;
            if (move.r) moveX += 1;
            if (moveX !== 0 || moveZ !== 0) {
                let len = Math.hypot(moveX, moveZ);
                moveX /= len; moveZ /= len;
            }
            let newX = camera.position.x + moveX * player.speed * delta;
            let newZ = camera.position.z + moveZ * player.speed * delta;
            let collision = false;
            for (let block of collisionBlocks) {
                if (newX > block.x1 && newX < block.x2 && newZ > block.z1 && newZ < block.z2) {
                    collision = true;
                    break;
                }
            }
            if (!collision && Math.abs(newX) < 45 && Math.abs(newZ) < 45) {
                camera.position.x = newX;
                camera.position.z = newZ;
            }
            player.x = camera.position.x;
            player.z = camera.position.z;
            
            if (centerZone && Math.hypot(player.x - centerZone.mesh.position.x, player.z - centerZone.mesh.position.z) < centerZone.radius) {
                gameActive = false;
                document.getElementById("endTitle").innerHTML = "🏆 VICTORY!";
                document.getElementById("endMsg").innerHTML = `Zone reached! Kills: ${killCount}`;
                document.getElementById("endScreen").classList.add("active");
                return;
            }
            
            for (let enemy of enemies) {
                let dx = player.x - enemy.x;
                let dz = player.z - enemy.z;
                let dist = Math.hypot(dx, dz);
                if (dist > 0.3) {
                    let moveX = (dx / dist) * enemy.speed * delta;
                    let moveZ = (dz / dist) * enemy.speed * delta;
                    let newEx = enemy.x + moveX;
                    let newEz = enemy.z + moveZ;
                    let blocked = false;
                    for (let block of collisionBlocks) {
                        if (newEx > block.x1 && newEx < block.x2 && newEz > block.z1 && newEz < block.z2) blocked = true;
                    }
                    if (!blocked && Math.abs(newEx) < 45 && Math.abs(newEz) < 45) {
                        enemy.x = newEx;
                        enemy.z = newEz;
                        enemy.mesh.position.set(enemy.x, 0.8, enemy.z);
                    }
                }
                if (dist < 1.5 && enemy.attackCd <= 0) {
                    player.hp -= 15;
                    updateUI();
                    enemy.attackCd = 1.2;
                    document.getElementById("damageOverlay").style.opacity = "0.5";
                    setTimeout(() => document.getElementById("damageOverlay").style.opacity = "0", 150);
                    if (player.hp <= 0) {
                        gameActive = false;
                        document.getElementById("endTitle").innerHTML = "💀 DEFEAT";
                        document.getElementById("endMsg").innerHTML = `You were slain. Kills: ${killCount}`;
                        document.getElementById("endScreen").classList.add("active");
                    }
                } else if (enemy.attackCd > 0) enemy.attackCd -= delta;
            }
        }

        // Controls
        document.addEventListener("keydown", (e) => {
            if (!gameActive) return;
            switch(e.code) {
                case "KeyW": move.f = true; break;
                case "KeyS": move.b = true; break;
                case "KeyA": move.l = true; break;
                case "KeyD": move.r = true; break;
                case "KeyR": reloadWeapon(); break;
            }
        });
        document.addEventListener("keyup", (e) => {
            switch(e.code) {
                case "KeyW": move.f = false; break;
                case "KeyS": move.b = false; break;
                case "KeyA": move.l = false; break;
                case "KeyD": move.r = false; break;
            }
        });
        document.addEventListener("mousemove", (e) => {
            if (document.pointerLockElement === renderer.domElement && gameActive) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, camera.rotation.x));
            }
        });
        renderer.domElement.addEventListener("click", () => renderer.domElement.requestPointerLock());
        document.addEventListener("mousedown", (e) => { if (e.button === 0 && gameActive) shoot(); });

        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (gameActive) updateMovement(delta);
            // Animate particles slowly
            particleSystem.rotation.y += 0.002;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        // UI binding (unchanged)
        document.getElementById("tabLogin").onclick = () => { document.getElementById("loginPanel").style.display = "block"; document.getElementById("registerPanel").style.display = "none"; };
        document.getElementById("tabReg").onclick = () => { document.getElementById("loginPanel").style.display = "none"; document.getElementById("registerPanel").style.display = "block"; };
        document.getElementById("loginBtn").onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPass").value); }
            catch(e) { document.getElementById("loginError").innerText = e.message; }
        };
        document.getElementById("regBtn").onclick = async () => {
            const name = document.getElementById("regName").value, email = document.getElementById("regEmail").value, pass = document.getElementById("regPass").value;
            if (pass.length < 6) return;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: name });
                await set(ref(db, `users/${cred.user.uid}`), { username: name });
            } catch(e) { document.getElementById("regError").innerText = e.message; }
        };
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById("authScreen").classList.remove("active");
                document.getElementById("loadoutScreen").classList.add("active");
            } else {
                document.getElementById("authScreen").classList.add("active");
                document.getElementById("loadoutScreen").classList.remove("active");
                document.getElementById("endScreen").classList.remove("active");
                gameActive = false;
            }
        });
        document.getElementById("logoutBtn").onclick = () => signOut(auth);
        document.getElementById("deployBtn").onclick = () => {
            const map = document.querySelector(".map-card[data-map].selected")?.dataset.map || "school";
            const weapon = document.querySelector(".map-card[data-weapon].selected")?.dataset.weapon || "assault";
            const armor = document.querySelector(".map-card[data-armor].selected")?.dataset.armor || "light";
            document.getElementById("loadoutScreen").classList.remove("active");
            startGame(map, weapon, armor);
        };
        document.getElementById("playAgainBtn").onclick = () => {
            document.getElementById("endScreen").classList.remove("active");
            document.getElementById("loadoutScreen").classList.add("active");
        };
        document.getElementById("menuBtn").onclick = () => {
            document.getElementById("endScreen").classList.remove("active");
            document.getElementById("loadoutScreen").classList.add("active");
        };
        document.querySelectorAll(".map-card").forEach(card => {
            card.addEventListener("click", function() {
                this.parentElement.querySelectorAll(".map-card").forEach(c => c.classList.remove("selected"));
                this.classList.add("selected");
            });
        });
        document.querySelector(".map-card[data-map='school']").classList.add("selected");
        document.querySelector(".map-card[data-weapon='assault']").classList.add("selected");
        document.querySelector(".map-card[data-armor='light']").classList.add("selected");
        
        const groundHelper = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ visible: false }));
        groundHelper.rotation.x = -Math.PI/2;
        groundHelper.position.y = -0.2;
        scene.add(groundHelper);
    </script>
</body>
</html>
